name: Build OpenWrt

 

on:

  workflow_dispatch:

 

jobs:

  build:

    runs-on: ubuntu-latest

 

    steps:

      - name: Checkout

        uses: actions/checkout@v3

 

      - name: Install dependencies

        run: |

          sudo apt update

          sudo apt install -y build-essential ccache ecj fastjar file g++ gawk gettext git java-propose-classpath libelf-dev libncurses-dev libssl-dev python3 python3-distutils-extra unzip wget python3-setuptools rsync subversion swig time xsltproc zlib1g-dev

 

      - name: Clone OpenWrt

        run: |

          git clone --depth 1 https://github.com/openwrt/openwrt.git

          cd openwrt

          ./scripts/feeds update -a

          ./scripts/feeds install -a

 

      - name: Add RTL88x2BU driver

        run: |

          cd openwrt

          wget https://github.com/mirobiala/rtl88x2bu-cl/archive/refs/heads/main.zip -O rtl88x2bu.zip

          unzip rtl88x2bu.zip -d package/kernel/

          mv package/kernel/rtl88x2bu-cl-main package/kernel/rtl88x2bu-cl

 

      - name: Copy config

        run: |

          cp openwrt.config openwrt/.config

          cd openwrt

          make defconfig

 

      - name: Build

        run: |

          cd openwrt
          make -j$(nproc) V=s 2>&1 | tee build.log || true
          grep -i "error\|ERROR" build.log | grep -v "Wno-error" | tail -50

 

      - name: Upload image

        uses: actions/upload-artifact@v4

        with:

          name: openwrt-image

          path: openwrt/bin/targets/bcm27xx/bcm2711/*.img.gz
